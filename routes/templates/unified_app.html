<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Bonvi Race Compare Tools</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no"/>
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

:root {
  --bg: #080c14;
  --surface: #0d1420;
  --surface2: #111827;
  --border: #1a2540;
  --border-hi: #253560;
  --a: #3b82f6;
  --a-soft: rgba(59,130,246,.15);
  --b: #f97316;
  --b-soft: rgba(249,115,22,.15);
  --gap-pos: #22d3ee;
  --gap-neg: #f43f5e;
  --text: #e2e8f0;
  --muted: #475569;
  --muted2: #94a3b8;
  --green: #22c55e;
  --font-ui: 'Syne', system-ui, sans-serif;
  --font-mono: 'Space Mono', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:var(--font-ui); }

/* ══════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════ */
#app-shell { height:100vh; display:flex; flex-direction:column; }

/* ── APP HEADER ── */
#app-header {
  background:var(--surface);
  border-bottom:2px solid var(--border);
  padding:0 20px;
  display:flex; align-items:stretch; gap:0;
  flex-shrink:0; height:46px;
}
#app-header .brand {
  display:flex; align-items:center; gap:10px;
  padding-right:24px; border-right:1px solid var(--border);
  margin-right:4px;
}
#app-header .brand h1 {
  font-size:.88rem; font-weight:800; letter-spacing:.1em;
  background:linear-gradient(90deg,var(--a),var(--b));
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  white-space:nowrap;
}

/* TABS */
.tab-nav { display:flex; align-items:stretch; gap:2px; }
.tab-btn {
  display:flex; align-items:center; gap:7px;
  padding:0 18px; border:none; background:transparent;
  color:var(--muted2); font-family:var(--font-ui); font-size:.78rem;
  font-weight:600; letter-spacing:.06em; cursor:pointer;
  border-bottom:2px solid transparent; margin-bottom:-2px;
  transition:all .2s; white-space:nowrap;
  text-transform:uppercase;
}
.tab-btn:hover { color:var(--text); border-bottom-color:var(--border-hi); }
.tab-btn.active-comp { color:var(--a); border-bottom-color:var(--a); }
.tab-btn.active-replay { color:var(--b); border-bottom-color:var(--b); }
.tab-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

/* VIEWS */
#view-comparison, #view-replay { display:none; flex:1; flex-direction:column; overflow:hidden; min-height:0; }
#view-comparison.active, #view-replay.active { display:flex; }

/* ══════════════════════════════════════════
   SHARED UPLOAD PANEL
══════════════════════════════════════════ */
.upload-panel {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:22px; padding:40px;
}
.upload-title { font-size:1.3rem; font-weight:800; letter-spacing:.08em; }
.upload-desc { color:var(--muted2); font-size:.82rem; max-width:400px; text-align:center; line-height:1.7; font-family:var(--font-mono); }
.upload-slots { display:flex; gap:18px; }
.upload-slot {
  width:210px; height:120px; border:2px dashed var(--border-hi); border-radius:12px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:8px; cursor:pointer; transition:all .22s; position:relative; overflow:hidden;
}
.upload-slot:hover { border-color:var(--a); background:var(--a-soft); }
.upload-slot.slot-b:hover { border-color:var(--b); background:var(--b-soft); }
.upload-slot.filled-a { border-color:var(--a); border-style:solid; background:var(--a-soft); }
.upload-slot.filled-b { border-color:var(--b); border-style:solid; background:var(--b-soft); }
.slot-icon { font-size:1.8rem; }
.slot-label { font-size:.7rem; font-weight:700; letter-spacing:.08em; color:var(--muted2); }
.slot-name { font-size:.7rem; font-weight:600; color:var(--text); text-align:center; padding:0 8px; }
.upload-slot input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; }

/* ══════════════════════════════════════════
   SHARED BUTTONS / UTILITIES
══════════════════════════════════════════ */
.btn {
  padding:5px 16px; border-radius:6px; border:none; cursor:pointer;
  font-family:var(--font-ui); font-size:.76rem; font-weight:700;
  letter-spacing:.04em; transition:all .18s; white-space:nowrap;
}
.btn-primary-a { background:linear-gradient(135deg,var(--a),#1d4ed8); color:#fff; }
.btn-primary-a:disabled { opacity:.38; cursor:not-allowed; }
.btn-primary-b { background:linear-gradient(135deg,var(--b),#c2410c); color:#fff; }
.btn-primary-b:disabled { opacity:.38; cursor:not-allowed; }
.btn-ghost { background:transparent; border:1px solid var(--border-hi); color:var(--muted2); }
.btn-ghost:hover { border-color:var(--a); color:var(--a); }
.btn-ghost.off { color:var(--muted); border-color:var(--border); }
.btn-warn { background:linear-gradient(135deg,#f59e0b,#d97706); color:#fff; }
.btn-danger { background:rgba(244,63,94,.14); border:1px solid #f43f5e44; color:#f43f5e; }
.btn-success { background:linear-gradient(135deg,#10b981,#059669); color:#fff; }

.badge {
  display:inline-flex; align-items:center; gap:5px; padding:3px 10px;
  border-radius:20px; font-size:.7rem; font-weight:700; font-family:var(--font-mono);
}
.badge-a { background:var(--a-soft); color:var(--a); border:1px solid var(--a); }
.badge-b { background:var(--b-soft); color:var(--b); border:1px solid var(--b); }

/* Loading overlay */
#loading {
  position:fixed; inset:0; background:rgba(8,12,20,.85); z-index:9999;
  display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px;
}
#loading.on { display:flex; }
.spin { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--a); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loading-text { color:var(--muted2); font-size:.82rem; font-family:var(--font-mono); }

/* ══════════════════════════════════════════
   WEIGHT PANEL (shared style)
══════════════════════════════════════════ */
.weight-panel {
  display:flex; align-items:center; gap:8px;
  padding:3px 12px; border:1px solid rgba(168,85,247,.45); border-radius:7px;
  background:rgba(168,85,247,.07); font-size:.7rem;
  font-family:var(--font-mono); color:var(--muted2); flex-shrink:0;
}
.weight-panel .wp-label { font-size:.64rem; text-transform:uppercase; letter-spacing:.06em; color:#a855f7; font-weight:700; }
.weight-panel .wp-sep { width:1px; height:14px; background:var(--border-hi); }
.weight-slider {
  -webkit-appearance:none; appearance:none; width:70px; height:4px;
  background:var(--border); border-radius:2px; cursor:pointer; outline:none; transition: background 0.2s;
}
.weight-slider::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none; width:12px; height:12px; border-radius:50%; cursor:pointer; transition: transform 0.1s;
}
.weight-slider::-moz-range-thumb {
  width:12px; height:12px; border:none; border-radius:50%; cursor:pointer; transition: transform 0.1s;
}
.weight-slider:hover::-webkit-slider-thumb { transform: scale(1.2); }
.weight-slider:hover::-moz-range-thumb { transform: scale(1.2); }

.slider-a::-webkit-slider-thumb { background: var(--a); }
.slider-a::-moz-range-thumb { background: var(--a); }
.slider-b::-webkit-slider-thumb { background: var(--b); }
.slider-b::-moz-range-thumb { background: var(--b); }

/* Pulsanti minuscoli per i microspostamenti del peso */
.wp-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; height: 14px; border: 1px solid var(--border-hi); border-radius: 3px;
  background: var(--surface2); color: var(--muted2); font-size: .65rem; font-weight: bold;
  cursor: pointer; user-select: none; transition: all 0.1s; line-height: 1; padding: 0;
}
.wp-btn:hover { background: var(--border-hi); color: var(--text); border-color: var(--muted); }
.wp-btn:active { transform: scale(0.85); }

/* !!!!!!!!Espande l'area di attivazione dello slider!!!!!!! (rotella e cursore a mano) */
.weight-slider {
  cursor: pointer;
  padding: 10px 0;   /* Crea un'area interattiva invisibile alta 20px in totale sopra/sotto */
  margin: -10px 0;   /* Compensa l'altezza per non allargare il pannello dei pesi */
}

/* w/kg chart toggles */
.ct-wkg-on  { background:rgba(216,180,254,.18); color:#d8b4fe; border-color:#d8b4fe; }
.ct-wkg-off { background:rgba(216,180,254,.05); color:rgba(216,180,254,.5); border-color:rgba(216,180,254,.3); }
.ct-dwkg-on  { background:rgba(216,180,254,.18); color:#d8b4fe; border-color:#d8b4fe; }
.ct-dwkg-off { background:rgba(216,180,254,.05); color:rgba(216,180,254,.5); border-color:rgba(216,180,254,.3); }

/* ══════════════════════════════════════════
   COMPARISON VIEW
══════════════════════════════════════════ */
#comp-topbar {
  display:flex; align-items:center; gap:10px; padding:8px 14px;
  background:var(--surface); border-bottom:1px solid var(--border);
  flex-shrink:0; flex-wrap:wrap;
}
#comp-topbar label { font-size:.72rem; color:var(--muted2); white-space:nowrap; }
#comp-topbar input[type=number] {
  width:68px; padding:3px 7px; background:var(--bg); border:1px solid var(--border-hi);
  border-radius:5px; color:var(--text); font-size:.8rem;
}
#comp-status { font-size:.72rem; color:var(--muted); margin-left:auto; font-family:var(--font-mono); }

#comp-main { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; }
#comp-map { flex:1; min-height:0; }

#comp-legend {
  position:absolute; top:12px; right:12px; background:rgba(8,12,20,.9);
  border:1px solid var(--border-hi); border-radius:10px; padding:10px 14px; z-index:100;
  backdrop-filter:blur(8px);
}
#comp-legend h4 { font-size:.7rem; color:var(--muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:.06em; }
.leg-item { display:flex; align-items:center; gap:8px; font-size:.75rem; margin-bottom:4px; }
.leg-line { width:26px; height:3px; border-radius:2px; flex-shrink:0; }

#comp-map-controls {
  position:absolute; bottom:195px; left:12px;
  display:flex; flex-direction:column; gap:5px; z-index:100;
}
.map-mini-btn {
  padding:5px 11px; background:rgba(8,12,20,.9); border:1px solid var(--border-hi);
  border-radius:6px; color:var(--text); cursor:pointer; font-size:.72rem;
  font-family:var(--font-mono); transition:all .18s;
}
.map-mini-btn:hover { border-color:var(--a); }

#comp-chart-panel {
  height:180px; background:var(--surface); border-top:2px solid var(--border);
  flex-shrink:0; position:relative;
}
#comp-chart-resize {
  position:absolute; top:0; left:0; right:0; height:5px;
  cursor:ns-resize; background:linear-gradient(var(--border-hi),transparent); z-index:10;
}
#comp-elevation-chart { width:100%; height:100%; padding-top:5px; }

#comp-hover-tip {
  position:absolute; background:rgba(8,12,20,.96); border:1px solid var(--border-hi);
  border-radius:6px; padding:7px 11px; font-size:.72rem; pointer-events:none;
  z-index:200; display:none; line-height:1.8; font-family:var(--font-mono);
}

/* Arrival panel */
#comp-arrival-panel {
  display:none; position:absolute; bottom:0; left:0; right:0; z-index:200;
  background:rgba(8,12,20,.97); border-top:2px solid var(--border);
  padding:9px 14px; flex-direction:column; gap:7px;
}

/* ══════════════════════════════════════════
   RACE REPLAY VIEW
══════════════════════════════════════════ */
#replay-hdr-info {
  display:flex; align-items:center; gap:12px; padding:8px 14px;
  background:var(--surface); border-bottom:1px solid var(--border);
  flex-shrink:0; flex-wrap:wrap;
}
#replay-gap-big {
  font-family:var(--font-mono); font-size:1.4rem; font-weight:700;
  margin-left:auto; transition:color .25s;
}

#replay-topbar {
  display:flex; align-items:center; gap:10px; padding:6px 14px;
  background:var(--surface2); border-bottom:1px solid var(--border);
  flex-shrink:0; flex-wrap:wrap;
}
#replay-topbar label { font-size:.7rem; color:var(--muted2); }
#replay-topbar select {
  background:var(--bg); border:1px solid var(--border-hi); color:var(--text);
  padding:3px 8px; border-radius:5px; font-size:.74rem;
}
#replay-status { font-size:.72rem; color:var(--muted); margin-left:auto; font-family:var(--font-mono); }

#replay-main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#replay-map-wrap { flex:1; position:relative; min-height:0; }
#replay-map { width:100%; height:100%; }

#replay-gap-overlay {
  position:absolute; top:10px; left:50%; transform:translateX(-50%);
  background:rgba(8,12,20,.93); border:1px solid var(--border-hi);
  border-radius:10px; padding:7px 14px;
  display:flex; gap:10px; align-items:center; z-index:100;
  backdrop-filter:blur(8px); pointer-events:none;
  flex-wrap:nowrap; white-space:nowrap;
  max-width:calc(100% - 20px); overflow-x:auto;
}
.ov-stat { text-align:center; min-width:44px; flex-shrink:0; }
.ov-stat .v { font-family:var(--font-mono); font-size:.82rem; font-weight:700; }
.ov-stat .l { font-size:.55rem; color:var(--muted); letter-spacing:.07em; text-transform:uppercase; margin-top:1px; }
.ov-diff .v { font-size:.78rem !important; }
.ov-sep { width:1px; height:28px; background:var(--border-hi); flex-shrink:0; }

#replay-map-legend {
  position:absolute; top:10px; right:10px; z-index:100;
  background:rgba(8,12,20,.9); border:1px solid var(--border-hi);
  border-radius:8px; padding:8px 12px; backdrop-filter:blur(8px);
}
#replay-map-controls {
  position:absolute; bottom:10px; left:10px;
  display:flex; flex-direction:column; gap:5px; z-index:100;
}

#replay-chart-panel {
  background:var(--surface); border-top:2px solid var(--border); flex-shrink:0; position:relative;
}
#replay-chart-resize {
  position:absolute; top:0; left:0; right:0; height:5px;
  cursor:ns-resize; background:linear-gradient(var(--border-hi),transparent); z-index:10;
}
#replay-chart-toggles {
  display:flex; gap:5px; padding:5px 12px 0; align-items:center; flex-wrap:wrap;
}
.chart-tog {
  padding:2px 9px; border-radius:14px; font-size:.66rem; font-weight:700;
  font-family:var(--font-mono); cursor:pointer; border:1px solid; transition:all .18s;
  letter-spacing:.04em;
}
/* Toggle button color families */
.ct-gap-on  { background:rgba(34,211,238,.18); color:#22d3ee; border-color:#22d3ee; }
.ct-gap-off { background:rgba(34,211,238,.06); color:rgba(34,211,238,.6); border-color:rgba(34,211,238,.4); }
.ct-spd-on   { background:rgba(34,197,94,.18); color:#22c55e; border-color:#22c55e; }
.ct-spd-off  { background:rgba(34,197,94,.06); color:rgba(34,197,94,.6); border-color:rgba(34,197,94,.4); }
.ct-spda-on  { background:rgba(34,197,94,.18); color:#22c55e; border-color:#22c55e; }
.ct-spda-off { background:rgba(34,197,94,.06); color:rgba(34,197,94,.6); border-color:rgba(34,197,94,.4); }
.ct-dspd-on  { background:rgba(34,197,94,.18); color:#22c55e; border-color:#22c55e; }
.ct-dspd-off { background:rgba(34,197,94,.06); color:rgba(34,197,94,.6); border-color:rgba(34,197,94,.4); }
.ct-dspda-on  { background:rgba(34,197,94,.18); color:#22c55e; border-color:#22c55e; }
.ct-dspda-off { background:rgba(34,197,94,.06); color:rgba(34,197,94,.6); border-color:rgba(34,197,94,.4); }
.ct-pwr-on   { background:rgba(168,85,247,.18); color:#a855f7; border-color:#a855f7; }
.ct-pwr-off  { background:rgba(168,85,247,.06); color:rgba(168,85,247,.6); border-color:rgba(168,85,247,.4); }
.ct-pwra-on  { background:rgba(168,85,247,.18); color:#a855f7; border-color:#a855f7; }
.ct-pwra-off { background:rgba(168,85,247,.06); color:rgba(168,85,247,.6); border-color:rgba(168,85,247,.4); }
.ct-dpwr-on  { background:rgba(168,85,247,.18); color:#a855f7; border-color:#a855f7; }
.ct-dpwr-off { background:rgba(168,85,247,.06); color:rgba(168,85,247,.6); border-color:rgba(168,85,247,.4); }
.ct-dpwra-on  { background:rgba(168,85,247,.18); color:#a855f7; border-color:#a855f7; }
.ct-dpwra-off { background:rgba(168,85,247,.06); color:rgba(168,85,247,.6); border-color:rgba(168,85,247,.4); }
.ct-hr-on   { background:rgba(239,68,68,.18); color:#ef4444; border-color:#ef4444; }
.ct-hr-off  { background:rgba(239,68,68,.06); color:rgba(239,68,68,.6); border-color:rgba(239,68,68,.4); }
.ct-dhr-on  { background:rgba(239,68,68,.18); color:#ef4444; border-color:#ef4444; }
.ct-dhr-off { background:rgba(239,68,68,.06); color:rgba(239,68,68,.6); border-color:rgba(239,68,68,.4); }
.ct-el-on   { background:rgba(148,163,184,.16); color:#94a3b8; border-color:#94a3b8; }
.ct-el-off  { background:rgba(148,163,184,.05); color:rgba(148,163,184,.55); border-color:rgba(148,163,184,.35); }

#replay-multi-chart { width:100%; }

#replay-playback {
  background:var(--surface); border-top:1px solid var(--border);
  padding:7px 14px; display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.pb-btn {
  padding:4px 12px; border:1px solid var(--border-hi); border-radius:6px;
  background:transparent; color:var(--text); cursor:pointer;
  font-family:var(--font-mono); font-size:.75rem; font-weight:700; transition:all .18s;
}
.pb-btn:hover { border-color:var(--a); color:var(--a); }
.pb-btn.pb-active { background:var(--a); border-color:var(--a); color:#fff; }
#replay-slider {
  flex:1; height:4px; -webkit-appearance:none; appearance:none;
  background:var(--border); border-radius:2px; cursor:pointer;
}
#replay-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:13px; height:13px;
  border-radius:50%; background:var(--a); cursor:pointer;
}
#replay-pb-time { font-family:var(--font-mono); font-size:.74rem; color:var(--muted2); min-width:90px; }

/* Replay start/end panel */
#rp-smooth-panel {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 7px 12px;
  background: rgba(8,12,20,.97);
  border: 1px solid var(--border-hi);
  border-radius: 8px;
  margin: 4px 0 2px 0;
  flex-wrap: wrap;
  font-size: .72rem;
  font-family: var(--font-mono);
  color: var(--muted2);
}
#rp-smooth-panel label { color: var(--muted2); margin-right:2px; }
#rp-smooth-panel select, #rp-smooth-panel input {
  background: #0f1729; border: 1px solid var(--border-hi); border-radius:4px;
  color: var(--fg); font-family: var(--font-mono); font-size:.72rem; padding:2px 5px;
}
#rp-smooth-panel input[type=number] { width: 52px; }
.smooth-group { display:flex; align-items:center; gap:6px; padding: 4px 10px; border: 1px solid var(--border-hi); border-radius:6px; }
.smooth-group .sg-label { color:#94a3b8; font-size:.68rem; text-transform:uppercase; letter-spacing:.05em; margin-right:2px; }

#rp-bounds-panel {
  display:none; position:absolute; bottom:0; left:0; right:0; z-index:200;
  background:rgba(8,12,20,.97); border-top:2px solid var(--border);
  padding:8px 14px; flex-direction:column; gap:7px;
}

/* end styles */
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading"><div class="spin"></div><div id="loading-text">Caricamento...</div></div>

<!-- APP SHELL -->
<div id="app-shell">

  <!-- APP HEADER with TABS -->
  <div id="app-header">
    <div class="brand">
      <h1>⚡ FIT TOOLS</h1>
    </div>
    <div class="tab-nav">
      <button class="tab-btn active-replay" id="tab-replay" onclick="switchTab('replay')">
        <div class="tab-dot" style="background:var(--b)"></div>🏁 RACE REPLAY
      </button>
      <button class="tab-btn" id="tab-comp" onclick="switchTab('comp')">
        <div class="tab-dot" style="background:var(--a)"></div>⚔️ COMPARISON
      </button>
    </div>
    <!-- File attivi + bottone cambio globale -->
    <div id="header-file-info" style="display:none; align-items:center; gap:10px; margin-left:auto; padding-right:4px;">
      <span style="font-size:.68rem; color:var(--muted2); font-family:var(--font-mono);">
        🔵 <span id="header-name-a" style="color:var(--a);">—</span>
        &nbsp;vs&nbsp;
        🟠 <span id="header-name-b" style="color:var(--b);">—</span>
      </span>
      <button class="btn btn-ghost" onclick="globalReset()" style="padding:3px 12px; font-size:.72rem; border-color:var(--border-hi);">📂 Cambia file</button>
    </div>
  </div>

  <!-- ════════════════ COMPARISON VIEW ════════════════ -->
  <div id="view-comparison">
{tab_comparison}
  </div>

  <!-- ════════════════ RACE REPLAY VIEW ════════════════ -->
  <div id="view-replay" class="active">
{tab_replay}
  </div>

</div><!-- /app-shell -->

<script>
// ═══════════════════════════════════════════════════════════════
// GLOBAL CONFIG
// ═══════════════════════════════════════════════════════════════
const MAPTILER_KEY = '{maptiler_key}';
const STYLES = {
  streets:   `https://api.maptiler.com/maps/streets-v2/style.json?key=${MAPTILER_KEY}`,
  outdoor:   `https://api.maptiler.com/maps/outdoor-v2/style.json?key=${MAPTILER_KEY}`,
  topo:      `https://api.maptiler.com/maps/topo-v2/style.json?key=${MAPTILER_KEY}`,
  satellite: `https://api.maptiler.com/maps/satellite/style.json?key=${MAPTILER_KEY}`,
  dark:      `https://api.maptiler.com/maps/dataviz-dark/style.json?key=${MAPTILER_KEY}`,
};
const SECTION_PALETTE = [
  '#e6194b','#3cb44b','#ffe119','#4363d8','#f58231','#911eb4',
  '#46f0f0','#f032e6','#bcf60c','#fabebe','#008080','#e6beff',
  '#9a6324','#fffac8','#800000','#aaffc3','#808000','#ffd8b1',
  '#000075','#808080',
];

function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg || '...';
  document.getElementById('loading').classList.add('on');
}
function hideLoading() { document.getElementById('loading').classList.remove('on'); }
function fmtTime(s) {
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// Mostra/aggiorna il badge file nell'header globale
function updateHeaderFileInfo() {
  const info = document.getElementById('header-file-info');
  if (!sharedStreamA || !sharedStreamB) { info.style.display = 'none'; return; }
  info.style.display = 'flex';
  document.getElementById('header-name-a').textContent = (sharedNameA || 'A').slice(0, 20);
  document.getElementById('header-name-b').textContent = (sharedNameB || 'B').slice(0, 20);
}

// Reset globale: azzera entrambe le tab e torna agli upload, mantenendo i file pronti al riuso
function globalReset() {
  // Salva i dati correnti PRIMA di azzerare (servono per pre-riempire gli slot)
  const prevStreamA = sharedStreamA;
  const prevStreamB = sharedStreamB;
  const prevNameA   = sharedNameA;
  const prevNameB   = sharedNameB;

  // ── Reset Race Replay ──
  if (typeof rpStopPlay === 'function') rpStopPlay();
  if (typeof rpAnimFrame !== 'undefined' && rpAnimFrame) { clearInterval(rpAnimFrame); rpAnimFrame = null; }
  if (typeof rpRemoveBoundsMarkers === 'function') rpRemoveBoundsMarkers();
  rpMapReady = false;
  rpBoundsPanelOpen = false;
  const rpBoundsPanel = document.getElementById('rp-bounds-panel');
  if (rpBoundsPanel) rpBoundsPanel.style.display = 'none';
  const rpBtnBounds = document.getElementById('rp-btn-bounds');
  if (rpBtnBounds) rpBtnBounds.classList.remove('off');
  rpSA = rpSB = null; rpAligned = []; rpCurrentT = 0;
  rpBoundStartA = rpBoundEndA = rpBoundStartB = rpBoundEndB = 0;
  if (rpMap) { rpMap.remove(); rpMap = null; }
  rpChart = null;
  if (typeof _rpD3 !== 'undefined') _rpD3 = { svg:null, g:null, xScale:null, yScales:{}, W:0, H:0, margin:{top:14,right:60,bottom:22,left:52}, cursorLine:null, xData:[], seriesData:{} };
  const rpChartEl = document.getElementById('replay-multi-chart');
  if (rpChartEl) rpChartEl.innerHTML = '';
  rpMarkerA = rpMarkerB = null;
  if (typeof _rpTrailLastA !== 'undefined') { _rpTrailLastA = -1; _rpTrailLastB = -1; }
  document.getElementById('replay-app').style.display = 'none';
  document.getElementById('replay-upload').style.display = 'flex';
  document.getElementById('rp-file-a').value = '';
  document.getElementById('rp-file-b').value = '';

  // ── Reset Comparison ──
  if (typeof compClearAnalysis === 'function') compClearAnalysis();
  compStreamA = null; compStreamB = null;
  compNameA = 'A'; compNameB = 'B';
  compSectors = []; compActiveSectorId = null; _compSectorIdCounter = 0;
  compElevChart = null;
  compZoomDomainX = null;
  compLayerVis = { traceA:true, traceB:true, sections:true };
  compGlobalStartA = 0; compGlobalEndA = 0;
  compGlobalStartB = 0; compGlobalEndB = 0;
  compOriginalStreams = { A: null, B: null };
  compCurrentChartTab = 'elev';
  compTableOpen = false;
  compSectorPanelOpen = false;
  compSmoothPanelOpen = false;
  window._compPendingInit = false;
  if (compMap) { try { compMap.remove(); } catch(e){} compMap = null; }
  compMapReady = false;
  compAnalysisLayers = [];
  compChartHoverMarkers = { a:null, b:null, lineSourceId:'comp-hover-line', lineLayerId:'comp-hover-line-ln' };
  document.querySelectorAll('.comp-tooltip').forEach(el => el.remove());
  const compChartEl = document.getElementById('comp-elevation-chart');
  if (compChartEl) compChartEl.innerHTML = '';
  const drawer = document.getElementById('comp-table-drawer');
  if (drawer) drawer.style.transform = 'translateY(100%)';
  document.getElementById('comp-btn-table').classList.remove('off');
  const sectorPanel = document.getElementById('comp-sector-panel');
  if (sectorPanel) sectorPanel.style.display = 'none';
  const smoothPanel = document.getElementById('comp-smooth-panel');
  if (smoothPanel) smoothPanel.style.display = 'none';
  document.getElementById('comp-app').style.display = 'none';
  document.getElementById('comp-upload').style.display = 'flex';
  document.getElementById('comp-status').textContent = '';
  document.getElementById('comp-file-a').value = '';
  document.getElementById('comp-file-b').value = '';

  // ── Torna alla tab replay ──
  switchTab('replay');

  // ── Pre-riempie gli slot con i file precedenti (se esistono) ──
  // I stream originali restano in sharedStreamA/B per il riuso.
  // Il flag _slotReady = 'cached' segnala che non serve un nuovo upload.
  if (prevStreamA && prevStreamB) {
    sharedStreamA = prevStreamA;
    sharedStreamB = prevStreamB;
    sharedNameA   = prevNameA;
    sharedNameB   = prevNameB;

    // Slot Race Replay
    const rpSlotA = document.getElementById('rp-slot-a');
    const rpSlotB = document.getElementById('rp-slot-b');
    rpSlotA.classList.add('filled-a');
    rpSlotB.classList.add('filled-b');
    document.getElementById('rp-name-a').textContent = prevNameA.slice(0, 22) + ' ✓';
    document.getElementById('rp-name-b').textContent = prevNameB.slice(0, 22) + ' ✓';
    rpSlotA._slotReady = 'cached';
    rpSlotB._slotReady = 'cached';
    document.getElementById('rp-btn-go').disabled = false;

    // Slot Comparison
    const cSlotA = document.getElementById('comp-slot-a');
    const cSlotB = document.getElementById('comp-slot-b');
    cSlotA.className = 'upload-slot filled-a';
    cSlotB.className = 'upload-slot slot-b filled-b';
    document.getElementById('comp-name-a').textContent = prevNameA.slice(0, 22) + ' ✓';
    document.getElementById('comp-name-b').textContent = prevNameB.slice(0, 22) + ' ✓';
    cSlotA._slotReady = 'cached';
    cSlotB._slotReady = 'cached';
    document.getElementById('comp-btn-go').disabled = false;

    updateHeaderFileInfo();
  } else {
    // Nessun file precedente: slot vuoti normali
    document.getElementById('rp-slot-a').classList.remove('filled-a');
    document.getElementById('rp-slot-b').classList.remove('filled-b');
    document.getElementById('rp-name-a').textContent = 'Seleziona .fit';
    document.getElementById('rp-name-b').textContent = 'Seleziona .fit';
    document.getElementById('rp-btn-go').disabled = true;
    document.getElementById('comp-slot-a').className = 'upload-slot';
    document.getElementById('comp-slot-b').className = 'upload-slot slot-b';
    document.getElementById('comp-name-a').textContent = 'Seleziona .fit';
    document.getElementById('comp-name-b').textContent = 'Seleziona .fit';
    document.getElementById('comp-btn-go').disabled = true;
    sharedStreamA = null; sharedStreamB = null;
    sharedNameA = ''; sharedNameB = '';
    updateHeaderFileInfo();
  }
}

// ═══════════════════════════════════════════════════════════════
// ATHLETE WEIGHTS (kg) — shared between both tabs
// Impostato a 60 kg di default per l'inizializzazione corretta degli slider
// ═══════════════════════════════════════════════════════════════
let athleteWeights = { a: 60, b: 60 };

function setAthleteWeight(who, val) {
  const kg = parseFloat(val);
  athleteWeights[who] = (isNaN(kg) || kg < 35) ? 60 : kg;
  
  // Sincronizza la posizione degli slider tra i tab
  const inpRp = document.getElementById('rp-weight-' + who);
  const inpCp = document.getElementById('comp-weight-' + who);
  if (inpRp) inpRp.value = athleteWeights[who];
  if (inpCp) inpCp.value = athleteWeights[who];
  
  // Aggiorna dinamicamente i testi indicatori accanto agli slider
  const txtRp = document.getElementById('rp-weight-val-' + who);
  const txtCp = document.getElementById('comp-weight-val-' + who);
  if (txtRp) txtRp.textContent = athleteWeights[who].toFixed(1);
  if (txtCp) txtCp.textContent = athleteWeights[who].toFixed(1);
  
  // Aggiorna i grafici attivi se sono popolati
  if (activeTab === 'replay' && typeof rpAligned !== 'undefined' && rpAligned.length) {
    rpUpdateFrame(rpCurrentT);
    rpRenderCharts();
  }
  if (activeTab === 'comp') {
    if (typeof compElevChart !== 'undefined' && compElevChart) compUpdateElevChart();
    if (typeof compSectors !== 'undefined' && compSectors.some(s => s.analyzed)) compBuildMetricsTable();
  }
}

// Shared streams — populated by whichever tab uploads first
let sharedStreamA = null, sharedStreamB = null;
let sharedNameA = '', sharedNameB = '';

// ═══════════════════════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════════════════════
let activeTab = 'replay';

// Auto-init Replay from shared streams (called when Comparison loads files)
function rpAutoInitFromShared() {
  if (!sharedStreamA || !sharedStreamB) return;
  rpSA = sharedStreamA; rpSB = sharedStreamB;
  rpSA._rawPower = rpSA.power ? rpSA.power.slice() : [];
  rpSB._rawPower = rpSB.power ? rpSB.power.slice() : [];
  rpSA._rawSpeed = rpSA.speed ? rpSA.speed.slice() : null;
  rpSB._rawSpeed = rpSB.speed ? rpSB.speed.slice() : null;
  rpNameA = sharedNameA || 'A';
  rpNameB = sharedNameB || 'B';
  ['rp-lbl-a','rp-leg-a'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=rpNameA.slice(0,16); });
  ['rp-lbl-b','rp-leg-b'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=rpNameB.slice(0,16); });
  rpBoundStartA=0; rpBoundEndA=rpSA.lat.length-1;
  rpBoundStartB=0; rpBoundEndB=rpSB.lat.length-1;
  rpUpdateBoundsPanelUI();
  document.getElementById('replay-upload').style.display='none';
  document.getElementById('replay-app').style.display='flex';
  rpApplySmoothing();
  rpBuildAlignment();
  rpInitChart();
  rpRenderCharts();
  rpSetSpeed(1);
  updateHeaderFileInfo();
  setTimeout(() => {
    if (!rpMap) rpInitMap();
    else { rpMap.resize(); rpUpdateFrame(0); }
  }, 80);
}

// Auto-init Comparison from shared streams (called when Replay loads files)
function compAutoInitFromShared(streamA, streamB, nameA, nameB) {
  if (!streamA || !streamB) return;
  compStreamA = streamA; compStreamB = streamB;
  // Salva copie originali per ripristino (come fa compStart)
  compOriginalStreams.A = JSON.parse(JSON.stringify(compStreamA));
  compOriginalStreams.B = JSON.parse(JSON.stringify(compStreamB));
  compStreamA._rawPower = compStreamA.power ? compStreamA.power.slice() : [];
  compStreamB._rawPower = compStreamB.power ? compStreamB.power.slice() : [];
  compStreamA._rawSpeed = compStreamA.speed ? compStreamA.speed.slice() : null;
  compStreamB._rawSpeed = compStreamB.speed ? compStreamB.speed.slice() : null;
  if (typeof compApplySmoothing === 'function') compApplySmoothing();
  compNameA = nameA || 'A'; compNameB = nameB || 'B';
  ['comp-lbl-a','comp-leg-a'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=compNameA.slice(0,16); });
  ['comp-lbl-b','comp-leg-b'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=compNameB.slice(0,16); });
  // Inizializza bounds e settore default (come fa compStart)
  compGlobalStartA = 0; compGlobalEndA = compStreamA.lat.length - 1;
  compGlobalStartB = 0; compGlobalEndB = compStreamB.lat.length - 1;
  compSectors = []; _compSectorIdCounter = 0;
  if (typeof compAddSector === 'function') compAddSector(true);
  document.getElementById('comp-upload').style.display='none';
  document.getElementById('comp-app').style.display='flex';
  // Aggiorna badge header
  updateHeaderFileInfo();
  window._compPendingInit = true;
}

function switchTab(tab) {
  document.getElementById('view-comparison').classList.toggle('active', tab === 'comp');
  document.getElementById('view-replay').classList.toggle('active', tab === 'replay');
  document.getElementById('tab-comp').className = 'tab-btn' + (tab === 'comp' ? ' active-comp' : '');
  document.getElementById('tab-replay').className = 'tab-btn' + (tab === 'replay' ? ' active-replay' : '');
  activeTab = tab;
  setTimeout(() => {
    if (tab === 'comp') {
      if (window._compPendingInit && compStreamA && compStreamB) {
        window._compPendingInit = false;
        if (!compMap) {
          // Prima volta: inizializza mappa (compInitElevChart viene chiamato nel suo callback 'load')
          compInitMap();
        } else {
          // Mappa già esistente (es. caricamento da Replay dopo che Comp era già stato usato):
          // ridisegna tracce e reinizializza grafico direttamente
          if (typeof compMapReady !== 'undefined' && compMapReady) {
            if (typeof compDrawTrace === 'function') {
              compDrawTrace('comp-ta', compStreamA, '#3b82f6');
              compDrawTrace('comp-tb', compStreamB, '#f97316');
            }
            if (typeof compRenderSectorMarkersAll === 'function') compRenderSectorMarkersAll();
          }
          if (typeof compInitElevChart === 'function') compInitElevChart();
        }
      } else if (compElevChart) {
        // Grafico già esistente: controlla che l'SVG abbia dimensioni valide
        const dom = document.getElementById('comp-elevation-chart');
        const svgEl = dom && dom.querySelector('svg');
        if (!svgEl || parseInt(svgEl.getAttribute('width') || '0') < 10) {
          if (typeof compUpdateElevChart === 'function') compUpdateElevChart();
        } else {
          if (typeof compResizeChart === 'function') compResizeChart();
        }
      }
    }
    if (tab === 'replay') {
      rpUpdateSharedBadge();
      if (rpChart) rpResizeChart();
      if (rpMap) {
        rpMap.resize();
        if (rpAligned.length) rpUpdateFrame(rpCurrentT);
      }
    }
  }, 80);
}
</script>

</body>
</html>
